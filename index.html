<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OL武将筛选导出工具</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --gold: #d4af37;
            --gold-dark: #aa8c2c;
            --text-main: #e0e0e0;
            --border: #333;
            --selected: #1d5f3a;
            --danger: #8b0000;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #2a2a2a 0%, #121212 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(18, 18, 18, 0.96);
            border-bottom: 2px solid var(--gold-dark);
            padding: 14px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .inner {
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 11px 14px;
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--gold);
        }

        .check-label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-area {
            margin-top: 12px;
        }

        .group-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 9px;
            align-items: center;
        }

        .filter-label {
            color: #888;
            font-size: 13px;
            margin-right: 4px;
            white-space: nowrap;
            user-select: none;
        }

        .btn,
        .filter-btn {
            border: 1px solid #444;
            background: #252525;
            color: #e0e0e0;
            border-radius: 7px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            white-space: nowrap;
        }

        .filter-btn {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn {
            padding: 9px 13px;
            font-size: 14px;
        }

        .btn:hover,
        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #333;
        }

        .btn-primary {
            border-color: var(--gold-dark);
            color: var(--gold);
        }

        .btn-danger:hover {
            border-color: #c33;
            color: #ff7777;
        }

        .selected-info {
            color: var(--gold);
            font-weight: bold;
            margin-left: auto;
            white-space: nowrap;
        }

        .sub-filter {
            display: none;
            padding-top: 8px;
            border-top: 1px solid #333;
        }

        .grid {
            display: grid;
            max-width: 1400px;
            margin: 0 auto;
            padding: 22px 20px;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
        }

        .card {
            color: inherit;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.25s;
            position: relative;
            user-select: none;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar-wrap {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            background: #000;
            position: relative;
            transition: 0.25s;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover .avatar-wrap {
            border-color: var(--gold);
        }

        .card.selected .avatar-wrap {
            border-color: #39d17d;
            box-shadow: 0 0 16px rgba(57, 209, 125, 0.65);
        }

        .card.selected .avatar-wrap::after {
            content: "已选";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            background: rgba(29, 95, 58, 0.92);
            color: #fff;
            font-size: 12px;
            text-align: center;
            padding: 3px 0;
            font-weight: bold;
        }

        .name {
            margin-top: 9px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        .meta {
            margin-top: 3px;
            color: #888;
            font-size: 11px;
            text-align: center;
        }

        .recent-tag {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 0 0 0 8px;
            z-index: 2;
        }

        .empty {
            max-width: 1400px;
            margin: 60px auto;
            text-align: center;
            color: #888;
            font-size: 15px;
        }

        .footer {
            text-align: center;
            color: #888;
            padding: 30px 20px;
            border-top: 1px solid #333;
            margin-top: 30px;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 10px 12px;
            }

            .search-row {
                gap: 8px;
            }

            input[type="text"] {
                padding: 9px 12px;
                font-size: 14px;
            }

            .filter-area {
                overflow: hidden;
            }

            .group-row {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 5px;
                -webkit-overflow-scrolling: touch;
            }

            .group-row::-webkit-scrollbar {
                display: none;
            }

            .filter-btn,
            .btn {
                flex-shrink: 0;
                font-size: 13px;
                padding: 6px 10px;
            }

            .selected-info {
                width: 100%;
                margin-left: 0;
                font-size: 13px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 13px;
                padding: 15px 12px;
            }

            .avatar-wrap {
                width: 85px;
                height: 85px;
                border-radius: 10px;
            }

            .name {
                font-size: 12px;
                margin-top: 6px;
            }

            .meta {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="inner">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="搜索武将名称 / 拼音 / 首字母...">

            <label class="check-label">
                <input type="checkbox" id="recentCheck">
                最近更新
            </label>

            <button class="btn btn-primary" onclick="openSelectedPage()">打开已选网页</button>
            <button class="btn btn-primary" onclick="downloadSelectedHtml()">下载HTML</button>
            <button class="btn btn-primary" onclick="downloadSelectedJson()">导出JSON</button>
            <button class="btn btn-danger" onclick="clearSelected()">清空选择</button>

            <div class="selected-info" id="selectedInfo">已选 0 个</div>
        </div>

        <div class="filter-area">
            <div class="group-row" id="qualityBox">
                <span class="filter-label">品质</span>
                <div class="filter-btn active" onclick="filterQuality('all', this)">全部</div>
                <div class="filter-btn" onclick="filterQuality('普通', this)">普通</div>
                <div class="filter-btn" onclick="filterQuality('稀有', this)">稀有</div>
                <div class="filter-btn" onclick="filterQuality('史诗', this)">史诗</div>
                <div class="filter-btn" onclick="filterQuality('传说', this)">传说</div>
                <div class="filter-btn" onclick="filterQuality('限定', this)">限定</div>
            </div>

            <div class="group-row" id="bigLampBox">
                <span class="filter-label">将灯</span>
                <div class="filter-btn active" onclick="filterBig('all', this)">全部</div>
            </div>

            <div class="group-row sub-filter" id="subLampBox"></div>
        </div>
    </div>
</div>

<div class="grid" id="heroGrid"></div>
<div class="empty" id="emptyBox" style="display:none;">没有符合条件的武将</div>

<div class="footer">
    OL武将筛选导出工具 · 点击武将卡片即可加入或取消选择
</div>

<script src="https://unpkg.com/pinyin-pro"></script>

const DICT_JD_FALLBACK = {
    "1-0": "标准",
    "4-0": "神话再临-风",
    "5-0": "神话再临-火",
    "6-0": "神话再临-林",
    "7-0": "神话再临-山",
    "34-0": "神话再临-阴",

    "99-0": "神话再临-神将",

    "21-0": "国战-标准"
};

const { pinyin } = pinyinPro;

let curQuality = 'all';
let curBig = 'all';
let curSub = 'all';

/**
 * 用 id 作为已选标识。
 */
const selectedIds = new Set();

/**
 * 数据预处理。
 */
const heroes = heroesRaw.map(raw => {
    const h = { ...raw };

    let jd = h.jiangdeng;

    if (String(h.id) === "350") {
        jd = "限定";
    } else if (h.faction === "神" && h.origFaction) {
        jd = "神话再临-神将";
    } else if (!jd) {
        jd = DICT_JD_FALLBACK[`${h.exType}-${h.genItemType}`] || "无";
    }

    if (String(h.id) === "362") jd = "神话再临-阴";
    if (String(h.id) === "100") jd = "神话再临-雷";

    h.finalJd = jd;
    h.bigJd = jd.includes('-') ? jd.split('-')[0] : jd;
    h.quality = h.quality || "普通";

    h.py = pinyin(h.fullName || '', {
        toneType: 'none',
        nonZh: 'consonant'
    }).replace(/\s/g, '').toLowerCase();

    h.pyFirst = pinyin(h.fullName || '', {
        pattern: 'first',
        toneType: 'none'
    }).replace(/\s/g, '').toLowerCase();

    return h;
});

function escapeHtml(str) {
    return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getHeroImageUrl(h) {
    const useId = h.useId || h.id;
    return `https://web.sanguosha.com/220/h5_2/res/runtime/pc/general/skinShop/${useId}00.png`;
}

function getHeroBackupImageUrl(h) {
    const useId = h.useId || h.id;
    return `https://web.sanguosha.com/220/h5_2/res/runtime/pc/activity/shequshow/xingxiang/${useId}00.png`;
}

function buildFilterUI() {
    const bigSet = new Set();

    heroes.forEach(h => {
        if (h.bigJd && h.bigJd !== "无") {
            bigSet.add(h.bigJd);
        }
    });

    const box = document.getElementById('bigLampBox');

    [...bigSet].sort((a, b) => a.localeCompare(b, 'zh-CN')).forEach(name => {
        const btn = document.createElement('div');
        btn.className = 'filter-btn';
        btn.textContent = name;
        btn.onclick = () => filterBig(name, btn);
        box.appendChild(btn);
    });
}

function filterQuality(quality, el) {
    document.querySelectorAll('#qualityBox .filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    el.classList.add('active');
    curQuality = quality;
    render();
}

function filterBig(name, el) {
    document.querySelectorAll('#bigLampBox .filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    el.classList.add('active');

    curBig = name;
    curSub = 'all';

    const subBox = document.getElementById('subLampBox');
    subBox.innerHTML = '';

    if (name === 'all') {
        subBox.style.display = 'none';
        render();
        return;
    }

    const subs = [...new Set(
        heroes
            .filter(h => h.bigJd === name)
            .map(h => h.finalJd)
    )].sort((a, b) => a.localeCompare(b, 'zh-CN'));

    if (subs.length <= 1) {
        subBox.style.display = 'none';
        render();
        return;
    }

    subBox.style.display = 'flex';

    const allBtn = document.createElement('div');
    allBtn.className = 'filter-btn active';
    allBtn.textContent = '全部';
    allBtn.onclick = () => filterSub('all', allBtn);
    subBox.appendChild(allBtn);

    subs.forEach(sub => {
        const btn = document.createElement('div');
        btn.className = 'filter-btn';

        const displayName = sub.includes('-') ? sub.split('-').slice(1).join('-') : sub;
        btn.textContent = displayName;

        btn.onclick = () => filterSub(sub, btn);
        subBox.appendChild(btn);
    });

    render();
}

function filterSub(name, el) {
    document.querySelectorAll('#subLampBox .filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    el.classList.add('active');
    curSub = name;
    render();
}

function isHeroMatched(h) {
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();
    const recent = document.getElementById('recentCheck').checked;

    if (kw) {
        const matchName = String(h.fullName || '').toLowerCase().includes(kw);
        const matchPy = h.py.includes(kw);
        const matchFirst = h.pyFirst.includes(kw);

        if (!matchName && !matchPy && !matchFirst) return false;
    }

    if (curQuality !== 'all' && h.quality !== curQuality) return false;
    if (curBig !== 'all' && h.bigJd !== curBig) return false;
    if (curSub !== 'all' && h.finalJd !== curSub) return false;
    if (recent && h.updateTime !== 'recent') return false;

    return true;
}

function render() {
    const grid = document.getElementById('heroGrid');
    const emptyBox = document.getElementById('emptyBox');

    grid.innerHTML = '';

    const matched = heroes.filter(isHeroMatched);

    emptyBox.style.display = matched.length ? 'none' : 'block';

    const frag = document.createDocumentFragment();

    matched.forEach(h => {
        const card = document.createElement('div');
        card.className = 'card';

        if (selectedIds.has(String(h.id))) {
            card.classList.add('selected');
        }

        card.onclick = () => toggleSelect(h.id);

        const imgUrl = getHeroImageUrl(h);
        const backupUrl = getHeroBackupImageUrl(h);

        card.innerHTML = `
            <div class="avatar-wrap">
                <img class="avatar" loading="lazy"
                     src="${escapeHtml(imgUrl)}"
                     onerror="if(!this.dataset.retried){this.dataset.retried='1';this.src='${escapeHtml(backupUrl)}';}else{this.onerror=null;this.style.opacity='0';this.parentNode.style.background='#222';this.parentNode.innerHTML+='<div style=&quot;color:#777;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:bold;&quot;>暂无图</div>';}">
                ${h.updateTime === 'recent' ? '<div class="recent-tag">NEW</div>' : ''}
            </div>
            <div class="name">${escapeHtml(h.fullName)}</div>
            <div class="meta">${escapeHtml(h.quality)} · ${escapeHtml(h.finalJd)}</div>
        `;

        frag.appendChild(card);
    });

    grid.appendChild(frag);
    updateSelectedInfo();
}

function toggleSelect(id) {
    const key = String(id);

    if (selectedIds.has(key)) {
        selectedIds.delete(key);
    } else {
        selectedIds.add(key);
    }

    render();
}

function getSelectedHeroes() {
    return heroes.filter(h => selectedIds.has(String(h.id)));
}

function updateSelectedInfo() {
    document.getElementById('selectedInfo').textContent = `已选 ${selectedIds.size} 个`;
}

function clearSelected() {
    if (!selectedIds.size) return;

    if (!confirm('确定要清空所有已选武将吗？')) return;

    selectedIds.clear();
    render();
}

function copySelectedJson() {
    const selected = getSelectedHeroes();

    if (!selected.length) {
        alert('还没有选择任何武将');
        return;
    }

    const text = JSON.stringify(selected, null, 2);

    navigator.clipboard.writeText(text).then(() => {
        alert(`已复制 ${selected.length} 个武将的 JSON 数据`);
    }).catch(() => {
        prompt('复制失败，请手动复制：', text);
    });
}

function buildSelectedHtml() {
    const selected = getSelectedHeroes();

    const dataJson = JSON.stringify(selected)
        .replace(/</g, '\\u003c')
        .replace(/>/g, '\\u003e')
        .replace(/&/g, '\\u0026');

    return `<!DOCTYPE html>

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = \`
            <div class="avatar-wrap">
                <img class="avatar" loading="lazy"
                     src="\${escapeHtml(imgUrl(h))}"
                     onerror="if(!this.dataset.retried){this.dataset.retried='1';this.src='\${escapeHtml(backupUrl(h))}';}else{this.onerror=null;this.style.opacity='0';this.parentNode.style.background='#222';this.parentNode.innerHTML+='<div style=&quot;color:#777;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:bold;&quot;>暂无图</div>';}">
                \${h.updateTime === 'recent' ? '<div class="recent-tag">NEW</div>' : ''}
            </div>
            <div class="name">\${escapeHtml(h.fullName)}</div>
            <div class="meta">\${escapeHtml(h.quality || '')} · \${escapeHtml(h.finalJd || h.jiangdeng || '')}</div>
        \`;

        frag.appendChild(card);
    });

    grid.appendChild(frag);
}

render();
<\/script>
</body>
</html>`;
}

function openSelectedPage() {
    const selected = getSelectedHeroes();

    if (!selected.length) {
        alert('还没有选择任何武将');
        return;
    }

    const html = buildSelectedHtml();
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    window.open(url, '_blank');
}

function downloadSelectedHtml() {
    const selected = getSelectedHeroes();

    if (!selected.length) {
        alert('还没有选择任何武将');
        return;
    }

    const html = buildSelectedHtml();
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `已选武将列表_${selected.length}人.html`;
    document.body.appendChild(a);
    a.click();
    a.remove();

    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('recentCheck').addEventListener('change', render);

buildFilterUI();
render();

function downloadSelectedJson() {
    const selected = getSelectedHeroes();
    if (!selected.length) {
        alert('还没有选择任何武将');
        return;
    }
    const json = JSON.stringify(selected, null, 2);
    const blob = new Blob([json], {
        type: 'application/json;charset=utf-8'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '已选武将列表.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}
